# Example 1: Basic Queries with Temporary Tables
- role: user
  content: |
    CREATE TABLE #RecentOrders (
        OrderID INT,
        CustomerName VARCHAR(100),
        TotalAmount DECIMAL(10,2),
        OrderDate DATE
    );

    INSERT INTO #RecentOrders
    SELECT 
        o.OrderID,
        c.FirstName + ' ' + c.LastName AS CustomerName,
        SUM(oi.Price * oi.Quantity) AS TotalAmount,
        o.OrderDate
    FROM dbe_dbx_internships.switchschema.Orders o
    JOIN dbe_dbx_internships.switchschema.Customers c ON o.CustomerID = c.CustomerID
    JOIN dbe_dbx_internships.switchschema.OrderItems oi ON o.OrderID = oi.OrderID
    WHERE o.OrderDate > DATEADD(MONTH, -3, GETDATE())
    GROUP BY o.OrderID, c.FirstName, c.LastName, o.OrderDate;

    SELECT TOP 10 CustomerName, SUM(TotalAmount) AS TotalSpent
    FROM #RecentOrders
    GROUP BY CustomerName
    ORDER BY TotalSpent DESC;
- role: assistant
  content: |
    # Create a temporary table in the target schema (using OR REPLACE to avoid conflicts)
    spark.sql("""
    CREATE OR REPLACE TABLE dbe_dbx_internships.switchschema.RecentOrders (
        OrderID INT,
        CustomerName STRING,
        TotalAmount DECIMAL(10,2),
        OrderDate DATE
    )
    """)

    # Populate the temporary table
    spark.sql("""
    INSERT INTO dbe_dbx_internships.switchschema.RecentOrders
    SELECT 
        o.OrderID,
        concat_ws(' ', c.FirstName, c.LastName) AS CustomerName,
        SUM(oi.Price * oi.Quantity) AS TotalAmount,
        o.OrderDate
    FROM dbe_dbx_internships.switchschema.Orders o
    JOIN dbe_dbx_internships.switchschema.Customers c ON o.CustomerID = c.CustomerID
    JOIN dbe_dbx_internships.switchschema.OrderItems oi ON o.OrderID = oi.OrderID
    WHERE o.OrderDate > date_add(current_date(), -90)
    GROUP BY o.OrderID, c.FirstName, c.LastName, o.OrderDate
    """)

    # Query for top customers
    top_customers = spark.sql("""
    SELECT CustomerName, SUM(TotalAmount) AS TotalSpent
    FROM dbe_dbx_internships.switchschema.RecentOrders
    GROUP BY CustomerName
    ORDER BY TotalSpent DESC
    LIMIT 10
    """)

    # Display results
    display(top_customers)

    # Explicitly drop the temporary equivalent table
    spark.sql("DROP TABLE IF EXISTS dbe_dbx_internships.switchschema.RecentOrders")

# Example 2: Stored Procedure
- role: user
  content: |
    CREATE OR ALTER PROCEDURE dbo.UpdateProductPrice
        @ProductID INT,
        @NewPrice DECIMAL(10,2)
    AS
    BEGIN
        SET NOCOUNT ON;

        IF NOT EXISTS (SELECT 1 FROM dbe_dbx_internships.switchschema.Products WHERE ProductID = @ProductID)
        BEGIN
            PRINT 'Product not found';
            RETURN;
        END

        UPDATE dbe_dbx_internships.switchschema.Products
        SET Price = @NewPrice
        WHERE ProductID = @ProductID;

        SELECT * FROM dbe_dbx_internships.switchschema.Products WHERE ProductID = @ProductID;
    END;
- role: assistant
  content: |
    # Use widgets for parameter input
    dbutils.widgets.text("ProductID", "")
    dbutils.widgets.text("NewPrice", "")

    # Validate input
    try:
        product_id = int(dbutils.widgets.get("ProductID"))
        new_price = float(dbutils.widgets.get("NewPrice"))
    except ValueError:
        print("Invalid parameters.")
        dbutils.notebook.exit("Error")

    # Check if product exists
    exists_df = spark.sql(f"SELECT 1 FROM dbe_dbx_internships.switchschema.Products WHERE ProductID = {product_id}")
    if exists_df.count() == 0:
        print("Product not found.")
        dbutils.notebook.exit("No such product.")

    # Update price
    spark.sql(f"""
    UPDATE dbe_dbx_internships.switchschema.Products
    SET Price = {new_price}
    WHERE ProductID = {product_id}
    """)

    # Return updated product
    updated_df = spark.sql(f"SELECT * FROM dbe_dbx_internships.switchschema.Products WHERE ProductID = {product_id}")
    display(updated_df)

# Example 3: Stored Procedure with Transaction Handling
- role: user
  content: |
    CREATE OR ALTER PROCEDURE dbo.UpdateProductPriceWithTransaction
        @ProductID INT,
        @NewPrice DECIMAL(10,2)
    AS
    BEGIN
        BEGIN TRANSACTION;
        BEGIN TRY
            UPDATE dbe_dbx_internships.switchschema.Products
            SET Price = @NewPrice
            WHERE ProductID = @ProductID;
            COMMIT TRANSACTION;
        END TRY
        BEGIN CATCH
            ROLLBACK TRANSACTION;
            THROW;
        END CATCH

        SELECT * FROM dbe_dbx_internships.switchschema.Products WHERE ProductID = @ProductID;
    END;
- role: assistant
  content: |
    # Widgets for parameters
    dbutils.widgets.text("ProductID", "")
    dbutils.widgets.text("NewPrice", "")

    # Convert inputs
    product_id = int(dbutils.widgets.get("ProductID"))
    new_price = float(dbutils.widgets.get("NewPrice"))

    # Capture the current timestamp for rollback
    try:
        hist = spark.sql("DESCRIBE HISTORY dbe_dbx_internships.switchschema.Products LIMIT 1").collect()[0]
        restore_ts = hist["timestamp"]
    except:
        restore_ts = None

    try:
        # Perform the update
        spark.sql(f"""
        UPDATE dbe_dbx_internships.switchschema.Products
        SET Price = {new_price}
        WHERE ProductID = {product_id}
        """)

    except Exception as e:
        # Rollback via restore if available
        if restore_ts is not None:
            spark.sql(f"RESTORE TABLE dbe_dbx_internships.switchschema.Products TO TIMESTAMP AS OF '{restore_ts}'")
            print("Table restored to previous version.")
        raise e

    # Show final result
    final_df = spark.sql(f"SELECT * FROM dbe_dbx_internships.switchschema.Products WHERE ProductID = {product_id}")
    display(final_df)

# Example 4: Returning Table Fucntion
- role: user
  content: |
    CREATE OR ALTER FUNCTION myschema.fn_getallocationdata
    (
        @paramSnapshotStart  BIGINT,
        @paramSector         NVARCHAR(100)
    )
    RETURNS TABLE
    AS
    RETURN
    (
        WITH

        -- 1. Authorised users
        CurrentDGO AS (
            SELECT DISTINCT DGO
            FROM   myschema.dwh.factreportuserpermissions
            WHERE  UserPrincipalName = SYSTEM_USER
        ),

        -- 2. Source with normalised ODS mapping
        DataMapped AS (
            SELECT
                F.*,
                UPPER(LTRIM(RTRIM(
                    CASE F.ODSSource
                        WHEN 'fluv' THEN 'FLUVIUS'
                        WHEN 'sibe' THEN 'SIBELGA'
                        WHEN 'ores' THEN 'ORES'
                        ELSE F.ODSSource
                    END
                ))) AS ODSSource_Normalized
            FROM myschema.allocation.Allocation F
        )

        SELECT
            F.ODSSource,
            F.AllocationMonth,
            F.DGOName,
            F.Sector,
            CASE F.Sector
                WHEN 'Gas'         THEN 'SE PI 6'
                WHEN 'Electricity' THEN 'SE PI 5'
            END                                             AS PIId,
            CASE WHEN F.AllocationRunId IS NULL THEN 1 ELSE 0 END AS Missing

        FROM       DataMapped F
        INNER JOIN CurrentDGO C ON F.DGOName = C.DGO

        WHERE
            F.FirstRun = 1
            AND @paramSnapshotStart <= CAST(FORMAT(F.Date, 'yyyyMMddHHmmss') AS BIGINT)
            AND F.Sector = @paramSector
    );

- role: assistant
  content: |
    # Table-Valued Function: fn_getallocationdata
    # Translated from MSSQL inline TVF to a Databricks SQL function + notebook test cell

    # --- Function definition ---
    # Widgets for parameters
    dbutils.widgets.text("paramSnapshotStart", "20240101000000")
    dbutils.widgets.text("paramSector", "Electricity")

    # Convert inputs
    param_snapshot_start = int(dbutils.widgets.get("paramSnapshotStart"))
    param_sector = dbutils.widgets.get("paramSector")

    # --- Register the function in the target schema ---
    spark.sql("""
    CREATE OR REPLACE FUNCTION myschema.fn_getallocationdata (
        _paramSnapshotStart  BIGINT,
        _paramSector         STRING
    )
    RETURNS TABLE (
        ODSSource       STRING,
        AllocationMonth STRING,
        DGOName         STRING,
        Sector          STRING,
        PIId            STRING,
        Missing         INT
    )
    RETURN (

      WITH

      -- 1. Authorised users
      CurrentDGO AS (
        SELECT DISTINCT DGO
        FROM   myschema.dwh.factreportuserpermissions
        WHERE  UserPrincipalName = current_user()
      ),

      -- 2. Source with normalised ODS mapping
      DataMapped AS (
        SELECT
            F.*,
            UPPER(TRIM(
                CASE F.ODSSource
                    WHEN 'fluv' THEN 'FLUVIUS'
                    WHEN 'sibe' THEN 'SIBELGA'
                    WHEN 'ores' THEN 'ORES'
                    ELSE F.ODSSource
                END
            )) AS ODSSource_Normalized
        FROM myschema.allocation.Allocation F
      )

      SELECT
          F.ODSSource,
          F.AllocationMonth,
          F.DGOName,
          F.Sector,
          CASE F.Sector
              WHEN 'Gas'         THEN 'SE PI 6'
              WHEN 'Electricity' THEN 'SE PI 5'
          END                                           AS PIId,
          CASE WHEN F.AllocationRunId IS NULL THEN 1 ELSE 0 END AS Missing

      FROM       DataMapped F
      NATURAL INNER JOIN CurrentDGO

      WHERE
          F.FirstRun = 1
          AND _paramSnapshotStart <= BIGINT(date_format(F.Date, 'yyyyMMddHHmmss'))
          AND F.Sector = _paramSector

    )
    """)

# Example 5: Int returning Function
- role: user
  content: |
    CREATE FUNCTION `ETL`.`fn_TimeKeyInt`
    (
        -- Add the parameters for the function here
        V_Time TIMESTAMP
    )
    RETURNS int
    AS


    RETURN CAST(CAST(EXTRACT(HOUR from V_Time) AS STRING)+ LEFT('0' || CAST(EXTRACT(MI from V_Time) AS STRING),2) AS INT)
    ;

- role: assistant
  content: |
    spark.sql("""
    CREATE OR REPLACE FUNCTION dbe_dbx_internships.switchschema.fn_TimeKeyInt( V_Time TIMESTAMP )
    RETURNS INT
    RETURN CAST(
            CONCAT(
                EXTRACT(HOUR FROM V_Time),
                LPAD(CAST(EXTRACT(MINUTE FROM V_Time) AS STRING), 2, '0')
            ) AS INT)
    """)

